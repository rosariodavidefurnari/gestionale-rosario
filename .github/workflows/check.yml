name: ✅ Check
on:
    push:
        branches:
            - main
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
    contents: write
    checks: write

jobs:
    lint:
        name: 🔬 ESLint
        runs-on: ubuntu-latest
        timeout-minutes: 10
        if: ${{ !github.event.pull_request.draft || github.event_name == 'push' }}
        steps:
            - name: 📥 Checkout repo
              uses: actions/checkout@v6

            - name: ⚙️ Setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 20
                  cache: npm

            - name: 📥 Download deps
              run: npm ci

            - name: 🔬 Lint
              uses: wearerequired/lint-action@v2
              with:
                  eslint: true
                  eslint_args: "**/*.{mjs,ts,tsx}"

            # Blocking gate: lint-action only annotates (continue-on-error) and
            # let prettier drift accumulate silently. This step FAILS the job on
            # any drift, so unformatted code can never merge again.
            - name: 💅 Prettier (blocking)
              run: npm run prettier

            # Blocking gate: doc<->code link drift. Parses markdown-link paths in
            # docs/ + governance files and fails if any cited file/path no longer
            # exists (e.g. a moved/renamed source file). Stdlib-only python3,
            # preinstalled on ubuntu-latest. Catches structural drift, not prose.
            - name: 📑 Docs drift (blocking)
              run: npm run docs:drift

    test:
        name: 🔎 Test
        runs-on: ubuntu-latest
        timeout-minutes: 10
        if: ${{ !github.event.pull_request.draft || github.event_name == 'push' }}
        steps:
            - name: 📥 Checkout repo
              uses: actions/checkout@v6

            - name: ⚙️ Setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 20
                  cache: npm

            - name: 📥 Download deps
              run: npm ci

            - name: 🔎 Test
              run: make test-ci
              env:
                  VITE_SUPABASE_URL: http://localhost:54321
                  VITE_SB_PUBLISHABLE_KEY: dummy-key-for-ci


    build:
        name: 🔨 Build
        timeout-minutes: 10
        runs-on: ubuntu-latest
        if: ${{ !github.event.pull_request.draft || github.event_name == 'push' }}
        steps:
            - name: 📥 Checkout repo
              uses: actions/checkout@v6

            - name: ⚙️ Setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 20
                  cache: npm

            - name: 📥 Download deps
              run: npm ci

            - name: 🔨 Build
              run: npm run build
